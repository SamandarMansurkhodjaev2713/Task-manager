# Set `GIT_SHA` when building so `/version` matches the deployed revision, e.g.
#   $env:GIT_SHA = (git rev-parse HEAD); docker compose build
services:
  telegram-task-bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
    env_file:
      - .env
    environment:
      APP_DATA_DIR: /app/data
      DATABASE_URL: sqlite:///app/data/app.db
      RUST_BACKTRACE: "1"
    ports:
      - "8080:8080"
    volumes:
      - bot_sqlite_data:/app/data
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 5
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    restart: unless-stopped
    stop_grace_period: 30s

  tests:
    profiles:
      - test
    build:
      context: .
      dockerfile: Dockerfile
      target: test-runner
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
    working_dir: /app
    environment:
      TELEGRAM_BOT_TOKEN: test_token
      GOOGLE_SHEETS_ID: test_sheet
      GOOGLE_SHEETS_RANGE: Employees!A:F
      GOOGLE_SHEETS_API_KEY: test_key
      GOOGLE_GEMINI_API_KEY: test_key
      OPENAI_API_KEY: test_key
      DATABASE_URL: sqlite:///tmp/tests.db
      RUST_BACKTRACE: "1"
      # Match `.env.example` defaults so integration tests see the same flag baseline as production.
      FEATURE_FLAGS: onboarding_v2,admin_panel
    command: ["cargo", "test", "--workspace", "-j", "1"]
    restart: "no"

  smoke-check:
    profiles:
      - smoke
    image: curlimages/curl:8.17.0
    depends_on:
      telegram-task-bot:
        condition: service_healthy
    command:
      [
        "sh",
        "-c",
        "set -eu; curl -fsS http://telegram-task-bot:8080/healthz >/dev/null; curl -fsS http://telegram-task-bot:8080/healthz/deep >/dev/null; curl -fsS http://telegram-task-bot:8080/metrics >/dev/null; curl -fsS http://telegram-task-bot:8080/version | grep -q '\"version\":\"';",
      ]
    restart: "no"

volumes:
  bot_sqlite_data:
